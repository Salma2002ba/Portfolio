name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
      BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Disable API routes for static export
        run: mv src/app/api src/app/api.disabled

      - name: Build
        run: npm run build

      - name: Restore API routes
        run: mv src/app/api.disabled src/app/api

      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@4
