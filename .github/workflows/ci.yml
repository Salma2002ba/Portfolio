# CI : lint, tests (si présents), build Next, build Docker, smoke
# Voir docs/03-ci.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_test:
    name: lint_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Check for test script
        id: has_test
        run: |
          node -e "const p=require('./package.json'); const has=!!(p.scripts && p.scripts.test); require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'has_test='+has)"
        working-directory: .

      - name: Lint
        id: lint
        run: npm run lint

      - name: Unit tests
        id: test
        if: steps.has_test.outputs.has_test == 'true'
        run: npm test

      - name: Job summary
        if: always()
        run: |
          echo "## lint_test" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.has_test.outputs.has_test != 'true' && '⏭️ skipped (no script)' || (steps.test.outcome == 'success' && '✅ OK' || '❌') }} |" >> $GITHUB_STEP_SUMMARY

  build:
    name: build
    runs-on: ubuntu-latest
    needs: lint_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build app
        id: build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DOCKER_BUILD: 1

      - name: Job summary
        if: always()
        run: |
          echo "## build" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm run build | ${{ steps.build.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  docker_smoke:
    name: docker_smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        id: docker_build
        run: docker build -t portfolio:ci .

      - name: Smoke test
        id: smoke
        run: |
          docker run -d -p 3000:3000 --name smoke portfolio:ci
          sleep 10
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          docker stop smoke
          docker rm smoke
          [ "$code" = "200" ] || (echo "Expected 200, got $code" && exit 1)

      - name: Job summary
        if: always()
        run: |
          echo "## docker_smoke" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker build | ${{ steps.docker_build.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke (GET :3000) | ${{ steps.smoke.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
