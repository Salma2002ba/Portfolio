# CI : lint, tests, build (sans smoke — le smoke tourne dans security.yml après les scans)
# Voir docs/03-ci.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint

      - name: Job summary
        if: always()
        run: |
          echo "## lint" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm run lint | ${{ steps.lint.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Tests
        id: test
        run: npm run test:ci

      - name: Job summary
        if: always()
        run: |
          echo "## tests" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm run test:ci | ${{ steps.test.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build app
        id: build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DOCKER_BUILD: 1

      - name: Job summary
        if: always()
        run: |
          echo "## build" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm run build | ${{ steps.build.outcome == 'success' && '✅ OK' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
