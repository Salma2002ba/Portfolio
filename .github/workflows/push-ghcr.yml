# Build image et push vers GitHub Container Registry (GHCR)
# Déclenché sur push sur main. Tags : latest + SHA du commit.
# Voir docs/05-registry.md

name: Push to GHCR

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR exige des noms d'image en minuscules
  IMAGE_NAME: ${{ format('{0}/{1}', github.repository_owner, github.event.repository.name) }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image ref (lowercase for GHCR)
        id: image
        run: echo "ref=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.ref }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.ref }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
